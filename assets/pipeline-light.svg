<svg xmlns="http://www.w3.org/2000/svg" width="880" height="150" viewBox="0 0 880 150" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Capture -->
  <rect x="10" y="35" width="190" height="80" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="105" y="66" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">You capture</text>
  <text x="105" y="90" text-anchor="middle" font-size="12.5" fill="#57606a">text · voice · photo · PDF</text>

  <path d="M200 75 h32" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <!-- Inbox -->
  <rect x="240" y="35" width="150" height="80" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="315" y="66" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">00-Inbox</text>
  <text x="315" y="90" text-anchor="middle" font-size="12.5" fill="#57606a">drop it and forget it</text>

  <path d="M390 75 h52" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <text x="416" y="60" text-anchor="middle" font-size="11.5" fill="#8250df" font-weight="600">Cortex</text>

  <!-- Notes -->
  <rect x="450" y="35" width="200" height="80" rx="10" fill="#fbf3ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="550" y="66" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">10-Notes</text>
  <text x="550" y="90" text-anchor="middle" font-size="12.5" fill="#57606a">tagged · summarized · linked</text>

  <path d="M650 75 h52" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <text x="676" y="60" text-anchor="middle" font-size="11.5" fill="#8250df" font-weight="600">4+ notes</text>

  <!-- Wikis -->
  <rect x="710" y="35" width="160" height="80" rx="10" fill="#fbf3ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="790" y="66" text-anchor="middle" font-size="15" font-weight="600" fill="#1f2328">30-Wikis</text>
  <text x="790" y="90" text-anchor="middle" font-size="12.5" fill="#57606a">one page per topic</text>

  <defs>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8250df"/>
    </marker>
  </defs>
</svg>
