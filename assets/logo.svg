<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- rounded app tile -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#g)"/>
  <!-- mind / knowledge-graph: a symmetric radial burst around a central idea -->
  <g stroke="#ffffff" stroke-opacity="0.85" stroke-width="6.5" stroke-linecap="round">
    <line x1="128" y1="128" x2="128" y2="68"/>
    <line x1="128" y1="128" x2="180" y2="98"/>
    <line x1="128" y1="128" x2="180" y2="158"/>
    <line x1="128" y1="128" x2="128" y2="188"/>
    <line x1="128" y1="128" x2="76"  y2="158"/>
    <line x1="128" y1="128" x2="76"  y2="98"/>
    <line x1="128" y1="68"  x2="180" y2="98"/>
    <line x1="180" y1="158" x2="128" y2="188"/>
    <line x1="76"  y1="158" x2="76"  y2="98"/>
  </g>
  <!-- nodes -->
  <g fill="#ffffff">
    <circle cx="128" cy="128" r="21"/>
    <circle cx="128" cy="68"  r="11"/>
    <circle cx="180" cy="98"  r="11"/>
    <circle cx="180" cy="158" r="11"/>
    <circle cx="128" cy="188" r="11"/>
