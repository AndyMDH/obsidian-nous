<svg xmlns="http://www.w3.org/2000/svg" width="880" height="230" viewBox="0 0 880 230" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- four capture chips -->
  <rect x="20" y="20" width="180" height="40" rx="20" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="110" y="45" text-anchor="middle" font-size="13" fill="#1f2328">⌨️  Type or paste</text>

  <rect x="20" y="70" width="180" height="40" rx="20" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="110" y="95" text-anchor="middle" font-size="13" fill="#1f2328">🎤  Dictate (hands-free)</text>

  <rect x="20" y="120" width="180" height="40" rx="20" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="110" y="145" text-anchor="middle" font-size="13" fill="#1f2328">📷  Photo / screenshot</text>

  <rect x="20" y="170" width="180" height="40" rx="20" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="110" y="195" text-anchor="middle" font-size="13" fill="#1f2328">📄  PDF</text>

  <!-- arrows converging -->
  <path d="M200 40 C260 40 260 110 320 113" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#c1)"/>
  <path d="M200 90 C250 90 260 110 320 113" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#c1)"/>
  <path d="M200 140 C250 140 260 118 320 116" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#c1)"/>
  <path d="M200 190 C260 190 260 120 320 116" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#c1)"/>

  <!-- inbox -->
  <rect x="330" y="85" width="160" height="60" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="410" y="111" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">📥  00-Inbox</text>
  <text x="410" y="132" text-anchor="middle" font-size="11.5" fill="#57606a">drop it and forget it</text>

  <path d="M490 115 h60" stroke="#8250df" stroke-width="2" fill="none" marker-end="url(#c1)"/>
  <text x="520" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#8250df">Cortex</text>

  <!-- enriched note card -->
  <rect x="560" y="40" width="300" height="150" rx="10" fill="#fbf3ff" stroke="#8250df" stroke-width="1.5"/>
  <text x="578" y="70" font-size="14" font-weight="700" fill="#1f2328">2026-07-09 Client sync — data platform</text>
  <rect x="578" y="84" width="88" height="20" rx="10" fill="#ede1fd"/>
  <text x="622" y="98" text-anchor="middle" font-size="11" fill="#6639ba">#client-x</text>
  <rect x="674" y="84" width="110" height="20" rx="10" fill="#ede1fd"/>
  <text x="729" y="98" text-anchor="middle" font-size="11" fill="#6639ba">#data-platform</text>
  <text x="578" y="128" font-size="12" fill="#57606a">Summary, key points, decisions and</text>
  <text x="578" y="146" font-size="12" fill="#57606a">action items — original text preserved.</text>
  <text x="578" y="172" font-size="12" fill="#8250df">🔗 3 related notes linked</text>

  <defs>
    <marker id="c1" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#8250df"/>
    </marker>
  </defs>
</svg>
