<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a371f7"/>
    </marker>
  </defs>

  <!-- start -->
  <rect x="16" y="60" width="168" height="60" rx="30" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="44" y="97" font-size="20">📞</text>
  <text x="74" y="86" font-size="12.5" font-weight="650" fill="#e6edf3">Click when it starts</text>
  <text x="74" y="102" font-size="11" fill="#8b949e">or press ⌥M</text>

  <path d="M184 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#ma)"/>

  <!-- recording state -->
  <rect x="226" y="68" width="150" height="44" rx="22" fill="#2d2148"/>
  <circle cx="248" cy="90" r="5" fill="#ff7eb6"/>
  <text x="262" y="94" font-size="12.5" font-weight="650" fill="#c8b1fa">Call recording…</text>

  <path d="M376 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#ma)"/>

  <!-- stop -->
  <rect x="418" y="60" width="168" height="60" rx="30" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="446" y="97" font-size="20">📞</text>
  <text x="476" y="86" font-size="12.5" font-weight="650" fill="#e6edf3">Click when it ends</text>
  <text x="476" y="102" font-size="11" fill="#8b949e">same button</text>

  <path d="M586 90 h34" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#ma)"/>

  <!-- result -->
  <rect x="628" y="40" width="156" height="100" rx="16" fill="#1c1526" stroke="#a371f7" stroke-width="1.5"/>
  <text x="648" y="70" font-size="13" font-weight="700" fill="#e6edf3">Meeting note</text>
  <text x="648" y="92" font-size="11" fill="#8b949e">"Me:" / "Them:"</text>
  <text x="648" y="107" font-size="11" fill="#8b949e">labeled transcript</text>
  <text x="648" y="126" font-size="11" fill="#a371f7">📥 lands in your inbox</text>
</svg>
