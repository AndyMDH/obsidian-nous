<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ca" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a371f7"/>
    </marker>
  </defs>

  <!-- capture chips -->
  <g>
    <rect x="24" y="26" width="188" height="42" rx="21" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="46" y="53" font-size="14">⌨️</text>
    <text x="74" y="53" font-size="13" fill="#e6edf3">Type or paste</text>

    <rect x="24" y="76" width="188" height="42" rx="21" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="46" y="103" font-size="14">🎙️</text>
    <text x="74" y="103" font-size="13" fill="#e6edf3">Voice memo</text>

    <rect x="24" y="126" width="188" height="42" rx="21" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="46" y="153" font-size="14">📷</text>
    <text x="74" y="153" font-size="13" fill="#e6edf3">Photo / screenshot</text>

    <rect x="24" y="176" width="188" height="42" rx="21" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="46" y="203" font-size="14">📄</text>
    <text x="74" y="203" font-size="13" fill="#e6edf3">PDF</text>
  </g>

  <!-- converge -->
  <g stroke="#a371f7" stroke-width="1.8" fill="none">
    <path d="M212 47 C268 47 276 112 330 118" marker-end="url(#ca)"/>
    <path d="M212 97 C260 97 272 116 330 120" marker-end="url(#ca)"/>
    <path d="M212 147 C260 147 272 128 330 124" marker-end="url(#ca)"/>
    <path d="M212 197 C268 197 276 132 330 126" marker-end="url(#ca)"/>
  </g>

  <!-- inbox -->
  <rect x="340" y="88" width="146" height="66" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="413" y="116" text-anchor="middle" font-size="15" font-weight="650" fill="#e6edf3">📥 Inbox</text>
  <text x="413" y="138" text-anchor="middle" font-size="11.5" fill="#8b949e">drop it and forget it</text>

  <path d="M486 121 h38" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#ca)"/>
  <text x="505" y="108" text-anchor="middle" font-size="11" font-weight="650" fill="#a371f7">Cortex</text>

  <!-- result note card -->
  <rect x="532" y="34" width="326" height="174" rx="16" fill="#1c1526" stroke="#a371f7" stroke-width="1.5"/>
  <text x="554" y="68" font-size="14.5" font-weight="700" fill="#e6edf3">Client sync — data platform</text>
  <rect x="554" y="82" width="82" height="22" rx="11" fill="#2d2148"/>
  <text x="595" y="97" text-anchor="middle" font-size="11" fill="#c8b1fa">#client-x</text>
  <rect x="644" y="82" width="112" height="22" rx="11" fill="#2d2148"/>
  <text x="700" y="97" text-anchor="middle" font-size="11" fill="#c8b1fa">#data-platform</text>
  <text x="554" y="132" font-size="12.5" fill="#8b949e">Summary, key points, decisions, action</text>
  <text x="554" y="150" font-size="12.5" fill="#8b949e">items — the original capture kept inside.</text>
  <text x="554" y="184" font-size="12.5" fill="#a371f7">🔗 Linked to 3 related notes and a wiki</text>
</svg>
